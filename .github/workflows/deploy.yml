name: Deploy Site to Server

on:
  push:
    branches:
      - site-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20

    - name: Build frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build

    - name: Upload frontend and backend to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "frontend/build/*,backend/*"
        target: /home/${{ secrets.SERVER_USER }}/site-prod

    - name: Set up backend and restart
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/${{ secrets.SERVER_USER }}/site-prod
          
          # Если виртуальное окружение отсутствует — создаём
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          # Активируем виртуальное окружение и обновляем pip
          source venv/bin/activate
          pip install --upgrade pip

          # Устанавливаем зависимости
          pip install -r backend/requirements.txt

          # Перезапускаем сервис
          sudo systemctl restart your-backend.service
